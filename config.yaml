# arXiv preprint server. Free OA, full PDFs always available. Categories below
# are the most useful for this user's research interests; comment out any that
# add too much noise. Keyword filter (paper-filterer) handles relevance further.
arxiv:
  enabled: true
  categories:
    - physics.ao-ph    # atmospheric and oceanic physics
    - physics.flu-dyn  # fluid dynamics (sometimes hydrology methods)
    - cs.LG            # machine learning (filtered for Earth-app)
    - stat.ML          # statistics / ML
    - eess.IV          # remote-sensing image processing
    - cs.CV            # vision (sometimes RS-related)
  # arXiv has a polite-rate limit (3s between calls). Be conservative.
  per_category_max: 100   # cap per category per fetch run

