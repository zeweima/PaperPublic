# Paper tracker configuration. Edit anything here; the agents read it dynamically.

# Relevance score thresholds (paper-filterer assigns 0-10).
relevance_threshold: 6      # papers below this are dropped from the digest entirely
top_picks_threshold: 8      # papers >= this get a full per-paper note (and full-PDF for top picks)

# Max number of papers that get full per-paper summarization on a single run.
# Only top picks (score >= top_picks_threshold) are eligible; the highest-scoring
# `max_summaries_per_run` get notes. Anything beyond that, plus all papers below
# the top-picks threshold, appear in the digest using their OpenAlex abstract
# directly (no per-paper note). Prevents cost spikes on month-start (when AGU /
# Wiley journals batch-publish) and on first-runs after a gap.
max_summaries_per_run: 30

# Research interests. Drives the filterer's relevance scoring.
keywords:
  - Watershed Hydrology
  - Water Quality
  - Machine Learning (applied to Earth/env science)
  - Land Surface Modeling
  - Biogeochemistry
  - Agroecosystem modeling
  - Remote Sensing
  - Water Resources
  - Environmental Science
  - Climate Change
  - Agriculture

# How many days to re-scan on each daily run. We filter by `publication_date`
# (the only free-tier date filter on OpenAlex). AGU / Wiley monthly journals
# (WRR, GCB, GBC, JAMES, JGR-BG, One Earth) batch all their papers on the 1st
# of each month, so we need at least ~35 days of lookback to consistently see
# them. Dedup via state.seen_ids prevents resummarization, so this only costs
# extra API calls, not duplicate work in the digest.
lookback_days: 5

# Python interpreter used by the slash commands. On this machine `python` on PATH
# resolves to a Microsoft Store stub; we use the miniconda base instead.
# If you reinstall Python, update this one path.
python_path: "C:/Users/zeweima2/AppData/Local/miniconda3/python.exe"

